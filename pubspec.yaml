name: charavox
description: 多角色分音色有声书阅读器 — LLM 自动识别角色，AI 生成独特音色
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  dio: ^5.7.0
  just_audio: ^0.9.42
  epub_pro: ^5.1.0
  flutter_secure_storage: ^9.2.4
  file_picker: ^8.1.7
  path_provider: ^2.1.5
  path: ^1.9.1
  uuid: ^4.5.1
  crypto: ^3.0.6
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.4
  mockito: ^5.4.5

flutter:
  uses-material-design: true
